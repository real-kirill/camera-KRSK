        function getDirectionText(heading) {
            if (heading === null || isNaN(heading)) return "?";
            var directions = ["север", "северо-восток", "восток", "юго-восток", "юг", "юго-запад", "запад", "северо-запад"];
            var index = Math.round(heading / 45) % 8;
            return directions[index];
        }
        
        function getDistance(lat1, lon1, lat2, lon2) {
            var R = 6371000;
            var φ1 = lat1 * Math.PI / 180;
            var φ2 = lat2 * Math.PI / 180;
            var Δφ = (lat2 - lat1) * Math.PI / 180;
            var Δλ = (lon2 - lon1) * Math.PI / 180;
            var a = Math.sin(Δφ/2) * Math.sin(Δφ/2) +
                    Math.cos(φ1) * Math.cos(φ2) *
                    Math.sin(Δλ/2) * Math.sin(Δλ/2);
            var c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1-a));
            return R * c;
        }

            }

                    }).addTo(map).bindPopup("🚩 Отправление (моё местоположение)");

                        directionMarker = L.marker([lat, lng], {

                        }).addTo(map);

            compassStatus.innerHTML = `🧭 ожидание GPS`;
        }
        
        function toggleAutoUpdate() {
            if (!autoUpdateActive) startAutoUpdate();
            else stopAutoUpdate();
        }
        
        function toggleVoiceAssistant() {
            voiceEnabled = !voiceEnabled;
            if (voiceEnabled) {
                voiceAssistantBtn.textContent = '🎤 Голос (вкл)';
                voiceAssistantBtn.classList.remove('btn-voice');
                voiceAssistantBtn.classList.add('btn-voice-active');
                voiceStatus.style.display = 'block';
                speakText("Голосовой помощник включён");
            } else {
                voiceAssistantBtn.textContent = '🎤 Голос (выкл)';
                voiceAssistantBtn.classList.remove('btn-voice-active');
                voiceAssistantBtn.classList.add('btn-voice');
                voiceStatus.style.display = 'none';
                window.speechSynthesis.cancel();
            }
        }
        
        autoUpdateBtn.addEventListener('click', toggleAutoUpdate);
        voiceAssistantBtn.addEventListener('click', toggleVoiceAssistant);
        
        // ===== ГЕОКОДИНГ =====
        async function geocodeAddress(address) {
            if (!address.toLowerCase().includes('красноярск')) {
                address = address + ', Красноярск';
            }
            var url = `https://nominatim.openstreetmap.org/search?format=json&q=${encodeURIComponent(address)}&limit=1&accept-language=ru`;
            try {
                var response = await fetch(url, { headers: { 'User-Agent': 'GIBDD-Navigator/1.0' } });
                var data = await response.json();
                if (data && data.length > 0) {
                    return { lat: parseFloat(data[0].lat), lng: parseFloat(data[0].lon) };
                }
                return null;
            } catch (error) {
                console.error("Ошибка геокодинга:", error);
                return null;
            }
        }
        
        // ===== ПОСТРОЕНИЕ МАРШРУТА =====
        async function buildRoute(start, end) {
            var url = `https://router.project-osrm.org/route/v1/driving/${start.lng},${start.lat};${end.lng},${end.lat}?overview=full&geometries=geojson&steps=true&alternatives=false`;
            
            try {
                var response = await fetch(url);
                var data = await response.json();
                
                if (data.code === 'Ok' && data.routes && data.routes.length > 0) {
                    var route = data.routes[0];
                    currentSteps = [];
                    nextStepIndex = 0;
                    lastNotifiedStep = -1;
                    
                    if (route.legs && route.legs[0] && route.legs[0].steps) {
                        route.legs[0].steps.forEach(function(step) {
                            var instruction = step.maneuver.instruction;
                            if (instruction && instruction.length > 0) {
                                currentSteps.push({
                                    instruction: instruction,
                                    distance: step.distance
                                });
                            }
                        });
                    }
                    
                    var distance = (route.distance / 1000).toFixed(1);
                    var duration = Math.round(route.duration / 60);
                    
                    if (voiceEnabled) {
                        speakText(`Маршрут построен. Расстояние ${distance} км, время ${duration} минут`);
                    }
                    
                    return { geometry: route.geometry, distance: distance, duration: duration };
                }
                return null;
            } catch (error) {
                console.error("Ошибка OSRM:", error);
                return null;
            }
        }
        
        function displayRoute(geometry, distance, duration) {
            if (currentRoute) map.removeLayer(currentRoute);
            currentRoute = L.geoJSON(geometry, {
                style: { color: '#e74c3c', weight: 5, opacity: 0.8 }
            }).addTo(map);
            var routeInfo = document.getElementById('routeInfo');
            routeInfo.style.display = 'block';
            routeInfo.innerHTML = `📏 ${distance} км | ⏱️ ${duration} мин | 🚗 Автомобиль`;
            if (currentRoute.getBounds && currentRoute.getBounds().isValid()) {
                map.fitBounds(currentRoute.getBounds());
            }
        }
        
        // ===== КЛИКИ ПО КАРТЕ =====
        map.on('click', function(e) {
            if (waitingForStart) {
                startPointCoord = { lat: e.latlng.lat, lng: e.latlng.lng };
                if (startMarker) map.removeLayer(startMarker);
                startMarker = L.marker([startPointCoord.lat, startPointCoord.lng], {
                    icon: L.divIcon({ html: '<div style="background: #27ae60; width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; text-align: center; line-height: 28px; font-size: 14px; font-weight: bold;">A</div>', iconSize: [28, 28] })
                }).addTo(map).bindPopup("🚩 Отправление").openPopup();
                document.getElementById('startPoint').value = `${startPointCoord.lat.toFixed(4)}, ${startPointCoord.lng.toFixed(4)}`;
                waitingForStart = false;
            } else if (waitingForEnd) {
                endPointCoord = { lat: e.latlng.lat, lng: e.latlng.lng };
                if (endMarker) map.removeLayer(endMarker);
                endMarker = L.marker([endPointCoord.lat, endPointCoord.lng], {
                    icon: L.divIcon({ html: '<div style="background: #e74c3c; width: 28px; height: 28px; border-radius: 50%; border: 2px solid white; text-align: center; line-height: 28px; font-size: 14px; font-weight: bold;">B</div>', iconSize: [28, 28] })
                }).addTo(map).bindPopup("🏁 Назначение").openPopup();
                document.getElementById('endPoint').value = `${endPointCoord.lat.toFixed(4)}, ${endPointCoord.lng.toFixed(4)}`;
                waitingForEnd = false;
            }
        });
        
        document.getElementById('startPoint').addEventListener('focus', function() { waitingForStart = true; waitingForEnd = false; this.placeholder = "Кликните на карте"; });
        document.getElementById('endPoint').addEventListener('focus', function() { waitingForEnd = true; waitingForStart = false; this.placeholder = "Кликните на карте"; });
        
        document.getElementById('myLocationBtn').addEventListener('click', function() {
            if (!navigator.geolocation) { alert("Геолокация не поддерживается"); return; }
            this.textContent = "⏳...";
            navigator.geolocation.getCurrentPosition(
                function(position) {
                    map.setView([position.coords.latitude, position.coords.longitude], 16);
                    document.getElementById('myLocationBtn').textContent = "📍 Моё место";
                },
                function() { alert("Не удалось определить местоположение"); document.getElementById('myLocationBtn').textContent = "📍 Моё место"; }
            );
        });
        
        document.getElementById('gotoMeBtn').addEventListener('click', function() {
            if (!navigator.geolocation) { alert("Геолокация не поддерживается"); return; }
            navigator.geolocation.getCurrentPosition(
                function(position) { map.setView([position.coords.latitude, position.coords.longitude], 16); },
                function() { alert("Не удалось определить местоположение"); }
            );
        });
        
        document.getElementById('buildRouteBtn').addEventListener('click', async function() {
            var startText = document.getElementById('startPoint').value.trim();
            var endText = document.getElementById('endPoint').value.trim();
            
            if (!startText || !endText) {
                alert("Введите начальную и конечную точки");
                return;
            }
            
            this.textContent = "⏳ Поиск...";
            this.disabled = true;
            
            try {
                var start = startPointCoord;
                var end = endPointCoord;
                
                if (!start && startText && !startText.includes(",")) {
                    this.textContent = "⏳ Ищем откуда...";
                    start = await geocodeAddress(startText);
                }
                if (!end && endText && !endText.includes(",")) {
                    this.textContent = "⏳ Ищем куда...";
                    end = await geocodeAddress(endText);
                }
                
                if (!start && startText.includes(",")) {
                    var parts = startText.split(",");
                    start = { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
                }
                if (!end && endText.includes(",")) {
                    var parts = endText.split(",");
                    end = { lat: parseFloat(parts[0]), lng: parseFloat(parts[1]) };
                }
                
                if (!start) {
                    alert(`Не удалось найти адрес: ${startText}`);
                    this.textContent = "🗺️ Маршрут";
                    this.disabled = false;
                    return;
                }
                if (!end) {
                    alert(`Не удалось найти адрес: ${endText}`);
                    this.textContent = "🗺️ Маршрут";
                    this.disabled = false;
                    return;
                }
                
                this.textContent = "⏳ Строим маршрут...";
                var route = await buildRoute(start, end);
                
                if (route) {
                    displayRoute(route.geometry, route.distance, route.duration);
                    speakText(`Маршрут построен. Расстояние ${route.distance} км`);
                } else {
                    alert("Не удалось построить маршрут.");
                }
            } catch (err) {
                console.error("Ошибка:", err);
                alert("Ошибка при построении маршрута");
            } finally {
                this.textContent = "🗺️ Маршрут";
                this.disabled = false;
            }
        });
        
        document.getElementById('clearRouteBtn').addEventListener('click', function() {
            if (currentRoute) map.removeLayer(currentRoute);
            if (startMarker) map.removeLayer(startMarker);
            if (endMarker) map.removeLayer(endMarker);
            startPointCoord = null;
            endPointCoord = null;
            currentSteps = [];
            nextStepIndex = 0;
            lastNotifiedStep = -1;
            document.getElementById('startPoint').value = '';
            document.getElementById('endPoint').value = '';
            document.getElementById('routeInfo').style.display = 'none';
            speakText("Маршрут очищен");
        });
        
        var navBottom = document.getElementById('navBottom');
        var toggleBtn = document.getElementById('togglePanelBtn');
        toggleBtn.addEventListener('click', function() {
            navBottom.classList.toggle('hidden');
            this.textContent = navBottom.classList.contains('hidden') ? '▼' : '▲';
        });
        
        setTimeout(function() { map.invalidateSize(); }, 100);
        console.log("📱 Навигатор загружен! Всего камер:", cameras.length);
    </script>
</body>
</html>
